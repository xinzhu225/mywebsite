<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBER STORE</title>

<style>
/* 基础样式 */
body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  color: white;
}

/* 导航栏 */
nav {
  background: #111;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
nav .logo {
  font-size: 24px;
  font-weight: bold;
}
nav a {
  color: white;
  text-decoration: none;
  margin-left: 20px;
  font-weight: bold;
}
nav a:hover {
  color: #00ffff;
}

/* 头部 */
.header {
  text-align: center;
  padding: 80px 20px 40px 20px;
}
.header h1 {
  font-size: 50px;
  margin-bottom: 10px;
}
.header .subtitle {
  color: #888;
  font-size: 18px;
}

/* 产品卡片 */
.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  padding: 30px;
}
.card {
  background: #111;
  border: 1px solid #222;
  border-radius: 15px;
  padding: 25px;
  width: 260px;
  transition: transform 0.3s, box-shadow 0.3s;
}
.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 20px rgba(0,255,255,0.2);
}
.card h2 {
  margin-top: 0;
}
.card .price {
  font-size: 28px;
  margin: 15px 0;
  color: #00ffff;
}

/* 付款方式 */
.pay {
  margin-top: 50px;
  padding: 40px 20px;
  background: #111;
  text-align: center;
  border-top: 1px solid #222;
}
.pay h2 {
  margin-bottom: 20px;
}
.pay p {
  margin: 5px 0;
}
.pay .btn {
  display: inline-block;
  margin-top: 15px;
  padding: 12px 25px;
  background: #00ffff;
  color: black;
  text-decoration: none;
  border-radius: 10px;
  font-weight: bold;
  transition: background 0.3s;
}
.pay .btn:hover {
  background: #00bbbb;
}

/* 页脚 */
.footer {
  margin-top: 50px;
  padding: 20px;
  color: #666;
  font-size: 14px;
  text-align: center;
  border-top: 1px solid #222;
}

/* 响应式 */
@media screen and (max-width: 768px) {
  .container {
    flex-direction: column;
    align-items: center;
  }
  nav {
    flex-direction: column;
    align-items: flex-start;
  }
  nav a {
    margin: 10px 0 0 0;
  }
}
</style>
</head>

<body>

<!-- 导航栏 -->
<nav>
  <div class="logo">CYBER STORE</div>
  <div>
    <a href="#products">产品</a>
    <a href="#pay">购买</a>
    <a href="#contact">联系</a>
  </div>
</nav>

<!-- 头部 -->
<div class="header">
  <h1>CYBER STORE</h1>
  <p class="subtitle">海外数字服务 · 软件订阅 · 社媒工具</p>
</div>

<!-- 产品卡片 -->
<div id="products" class="container">
  <div class="card">
    <h2>Telegram Premium</h2>
    <p>稳定订阅服务</p>
    <div class="price">$5</div>
  </div>
  <div class="card">
    <h2>Spotify Premium</h2>
    <p>海外会员服务</p>
    <div class="price">$3</div>
  </div>
  <div class="card">
    <h2>Netflix</h2>
    <p>流媒体会员</p>
    <div class="price">$6</div>
  </div>
  <div class="card">
    <h2>ChatGPT Plus</h2>
    <p>AI工具服务</p>
    <div class="price">$10</div>
  </div>
</div>

<!-- 付款方式 -->
<div id="pay" class="pay">
  <h2>付款方式</h2>
  <p>USDT(TRC20)</p>
  <p>PayPal</p>
  <p>支付宝</p>
  <a class="btn" href="#contact">联系购买</a>
  <p style="margin-top:20px;" id="contact">Telegram：@yourname</p>
</div>

<!-- 页脚 -->
<div class="footer">
  © 2026 CYBER STORE
</div>

</body>
</html>
