<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBER STORE</title>
<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  padding:0;
  background:#0a0a0a;
  color:white;
}
/* 顶部通知 */
.topbar{
  background:#222;
  padding:8px 15px;
  text-align:center;
  font-size:14px;
  border-bottom:1px solid #333;
}
/* 导航栏 */
nav{
  background:#111;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
nav .logo{
  font-size:24px;
  font-weight:bold;
}
nav a{
  color:white;
  text-decoration:none;
  margin-left:18px;
  font-weight:bold;
}
nav a:hover{
  color:#00ffff;
}

/* 搜索区 */
.search-bar{
  padding:15px;
  text-align:center;
}
.search-bar input{
  width:60%;
  padding:10px;
  border-radius:8px;
  border:none;
  outline:none;
  font-size:16px;
}

/* 商品区 */
.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:20px;
}
.card{
  background:#111;
  border:1px solid #222;
  border-radius:12px;
  width:260px;
  padding:20px;
  text-align:center;
}
.card h2{margin-top:0;}
.card .price{
  color:#00ffff;
  font-size:26px;
  margin:12px 0;
}
.btn-buy{
  padding:10px 22px;
  background:#00ffff;
  color:black;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}
.btn-buy:hover{background:#00bbbb;}

/* 底部 */
.footer{
  text-align:center;
  padding:15px;
  margin-top:40px;
  border-top:1px solid #333;
  color:#777;
  font-size:14px;
}
</style>
</head>
<body>

<div class="topbar">
  ⚠️ 公告：本站商品仅供测试使用，请勿用于违法行为，否则后果自负
</div>

<nav>
  <div class="logo">CYBER STORE</div>
  <div>
    <a href="#products">产品</a>
    <a href="#search">搜索</a>
    <a href="#contact">客服</a>
  </div>
</nav>

<div id="search" class="search-bar">
  <input type="text" placeholder="输入商品名搜索…">
</div>

<div id="products" class="container">
  <div class="card">
    <h2>Telegram Premium</h2>
    <div class="price">$5</div>
    <button class="btn-buy" onclick="location.href='https://t.me/your客服'">购买</button>
  </div>
  <div class="card">
    <h2>Spotify Premium</h2>
    <div class="price">$3</div>
    <button class="btn-buy" onclick="location.href='https://t.me/your客服'">购买</button>
  </div>
  <div class="card">
    <h2>Netflix</h2>
    <div class="price">$6</div>
    <button class="btn-buy" onclick="location.href='https://t.me/your客服'">购买</button>
  </div>
</div>

<div id="contact" class="footer">
  💬 客服联系：<a href="https://t.me/your客服" style="color:#00ffff;">Telegram @your客服</a><br>
  © 2026 CYBER STORE
</div>

</body>
</html>
