<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI工具与数字资源商城</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b1020;
color:white;
overflow-x:hidden;
}

/* 顶部导航 */

header{
position:sticky;
top:0;
z-index:999;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo{
font-size:24px;
font-weight:bold;
color:#00e5ff;
}

nav a{
margin-left:20px;
text-decoration:none;
color:white;
transition:0.3s;
}

nav a:hover{
color:#00e5ff;
}

/* 轮播 */

.hero{
height:320px;
position:relative;
overflow:hidden;
}

.hero img{
width:100%;
height:320px;
object-fit:cover;
filter:brightness(0.55);
}

.hero-content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.hero-content h1{
font-size:52px;
margin-bottom:15px;
}

.hero-content p{
color:#ccc;
font-size:18px;
}

/* 搜索 */

.search-area{
padding:30px;
text-align:center;
}

.search-area input{
width:80%;
max-width:500px;
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
background:#161d33;
color:white;
outline:none;
}

/* 分类 */

.categories{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:12px;
padding:10px 20px 30px 20px;
}

.categories button{
padding:10px 18px;
border:none;
border-radius:50px;
background:#141d38;
color:white;
cursor:pointer;
transition:0.3s;
}

.categories button:hover{
background:#00e5ff;
color:black;
}

/* 商品 */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:20px;
max-width:1400px;
margin:auto;
}

.card{
background:#11182e;
border:1px solid rgba(255,255,255,0.08);
border-radius:20px;
padding:25px;
transition:0.3s;
position:relative;
overflow:hidden;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 0 25px rgba(0,229,255,0.2);
}

.card img{
width:70px;
height:70px;
object-fit:contain;
margin-bottom:15px;
}

.card h2{
font-size:22px;
margin-bottom:10px;
}

.card p{
color:#aaa;
font-size:14px;
line-height:1.6;
}

.price{
margin:18px 0;
font-size:30px;
font-weight:bold;
color:#00e5ff;
}

.tag{
display:inline-block;
padding:5px 10px;
border-radius:20px;
background:#00e5ff22;
color:#00e5ff;
font-size:12px;
margin-bottom:10px;
}

.btn{
display:inline-block;
padding:12px 18px;
border-radius:12px;
background:#00e5ff;
color:black;
font-weight:bold;
text-decoration:none;
margin-top:10px;
transition:0.3s;
cursor:pointer;
border:none;
}

.btn:hover{
background:white;
}

/* 商品详情 */

.modal{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
z-index:9999;
overflow:auto;
}

.modal-content{
background:#12192f;
max-width:600px;
margin:60px auto;
padding:30px;
border-radius:20px;
position:relative;
}

.close{
position:absolute;
right:20px;
top:15px;
font-size:30px;
cursor:pointer;
}

.modal img{
width:90px;
margin-bottom:15px;
}

.feature-list{
margin-top:20px;
}

.feature-list li{
margin-bottom:10px;
color:#ccc;
}

/* 购物车 */

.cart{
position:fixed;
right:20px;
bottom:100px;
width:300px;
background:#12192f;
border:1px solid rgba(255,255,255,0.1);
border-radius:20px;
padding:20px;
z-index:999;
}

.cart h3{
margin-bottom:15px;
}

.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:12px;
font-size:14px;
}

/* 客服按钮 */

.support{
position:fixed;
right:20px;
bottom:20px;
background:#00e5ff;
color:black;
padding:15px 22px;
border-radius:50px;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 20px rgba(0,229,255,0.3);
z-index:999;
}

/* 页脚 */

footer{
margin-top:60px;
padding:40px 20px;
text-align:center;
color:#888;
border-top:1px solid rgba(255,255,255,0.08);
}

/* 动画 */

.fade-in{
animation:fade 0.6s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<header>

<div class="logo">
AI资源站
</div>

<nav>
<a href="#">首页</a>
<a href="#">商品</a>
<a href="#">教程</a>
<a href="#">联系客服</a>
</nav>

</header>

<!-- 顶部轮播 -->

<div class="hero">

<img id="heroImg"
src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1600">

<div class="hero-content">
<h1>AI工具与数字资源商城</h1>
<p>AI工具 · 海外运营 · 数字资源 · 自动化教程</p>
</div>

</div>

<!-- 搜索 -->

<div class="search-area">

<input
type="text"
id="searchInput"
placeholder="搜索资源 / 教程 / AI工具">

</div>

<!-- 分类 -->

<div class="categories">

<button onclick="filterProducts('全部')">
全部
</button>

<button onclick="filterProducts('AI工具')">
AI工具
</button>

<button onclick="filterProducts('社媒运营')">
社媒运营
</button>

<button onclick="filterProducts('自动化')">
自动化
</button>

<button onclick="filterProducts('Web3')">
Web3
</button>

<button onclick="filterProducts('教程')">
教程
</button>

</div>

<!-- 商品列表 -->

<div class="products" id="productList"></div>

<!-- 商品详情 -->

<div class="modal" id="modal">

<div class="modal-content fade-in">

<span class="close"
onclick="closeModal()">
×
</span>

<img id="modalImg">

<h2 id="modalTitle"></h2>

<p id="modalDesc"></p>

<div class="price"
id="modalPrice">
</div>

<ul class="feature-list"
id="modalFeatures">
</ul>

<button class="btn"
onclick="addToCart()">
加入购物车
</button>

</div>

</div>

<!-- 购物车 -->

<div class="cart">

<h3>
购物车 🛒
</h3>

<div id="cartItems"></div>

<hr style="margin:15px 0;opacity:0.2;">

<div id="cartTotal">
总价：$0
</div>

</div>

<!-- 客服 -->

<div class="support"
onclick="window.open('https://t.me/ykc666')">

联系客服

</div>

<footer>

Telegram：@ykc666<br>
微信：15629384390<br><br>

© 2026 AI资源站

</footer>

<script>

/* 商品数据 */

const products = [

{
name:"ChatGPT Prompt大全",
category:"AI工具",
price:29,
img:"https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg",
desc:"包含500+高质量Prompt模板",
features:[
"适用于ChatGPT/Gemini",
"适合运营/营销/写作",
"持续更新"
]
},

{
name:"TikTok运营教程",
category:"社媒运营",
price:49,
img:"https://upload.wikimedia.org/wikipedia/commons/6/6c/TikTok_logo.svg",
desc:"从0到1搭建TikTok账号",
features:[
"账号起号技巧",
"热门视频结构",
"涨粉策略"
]
},

{
name:"Instagram引流模板",
category:"社媒运营",
price:39,
img:"https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png",
desc:"海外Instagram自动化引流方案",
features:[
"高转化文案",
"标签模板",
"自动化流程"
]
},

{
name:"Telegram自动化脚本",
category:"自动化",
price:59,
img:"https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg",
desc:"TG群发与自动管理工具",
features:[
"自动回复",
"群发系统",
"用户管理"
]
},

{
name:"Web3空投教程",
category:"Web3",
price:69,
img:"https://cryptologos.cc/logos/ethereum-eth-logo.png",
desc:"热门Web3空投交互教学",
features:[
"钱包配置",
"交互步骤",
"安全指南"
]
},

{
name:"Gemini高级用法",
category:"AI工具",
price:35,
img:"https://upload.wikimedia.org/wikipedia/commons/e/e2/Gemini_logo.svg",
desc:"Gemini AI深度工作流",
features:[
"AI办公",
"AI写作",
"AI自动化"
]
}

];

let filteredProducts = [...products];

let currentProduct = null;

let cart = [];

/* 渲染商品 */

function renderProducts(list){

const productList =
document.getElementById("productList");

productList.innerHTML = "";

list.forEach(product=>{

productList.innerHTML += `

<div class="card fade-in">

<div class="tag">
${product.category}
</div>

<img src="${product.img}">

<h2>
${product.name}
</h2>

<p>
${product.desc}
</p>

<div class="price">
$${product.price}
</div>

<button class="btn"
onclick='openModal(${JSON.stringify(product)})'>

查看详情

</button>

</div>

`;

});

}

renderProducts(filteredProducts);

/* 搜索 */

document.getElementById("searchInput")
.addEventListener("input",function(){

const keyword =
this.value.toLowerCase();

filteredProducts =
products.filter(p=>

p.name.toLowerCase().includes(keyword)

);

renderProducts(filteredProducts);

});

/* 分类 */

function filterProducts(category){

if(category==="全部"){

filteredProducts = [...products];

}else{

filteredProducts =
products.filter(p=>

p.category===category

);

}

renderProducts(filteredProducts);

}

/* 商品详情 */

function openModal(product){

currentProduct = product;

document.getElementById("modal")
.style.display = "block";

document.getElementById("modalImg")
.src = product.img;

document.getElementById("modalTitle")
.innerText = product.name;

document.getElementById("modalDesc")
.innerText = product.desc;

document.getElementById("modalPrice")
.innerText = "$"+product.price;

const featureList =
document.getElementById("modalFeatures");

featureList.innerHTML = "";

product.features.forEach(f=>{

featureList.innerHTML += `
<li>${f}</li>
`;

});

}

function closeModal(){

document.getElementById("modal")
.style.display = "none";

}

/* 加入购物车 */

function addToCart(){

cart.push(currentProduct);

renderCart();

alert("已加入购物车");

}

/* 渲染购物车 */

function renderCart(){

const cartItems =
document.getElementById("cartItems");

cartItems.innerHTML = "";

let total = 0;

cart.forEach(item=>{

total += item.price;

cartItems.innerHTML += `

<div class="cart-item">

<span>
${item.name}
</span>

<span>
$${item.price}
</span>

</div>

`;

});

document.getElementById("cartTotal")
.innerText = "总价：$"+total;

}

/* 顶部轮播 */

const heroImages = [

"https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1600",

"https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1600",

"https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1600"

];

let heroIndex = 0;

setInterval(()=>{

heroIndex =
(heroIndex+1)%heroImages.length;

document.getElementById("heroImg")
.src = heroImages[heroIndex];

},4000);

</script>

</body>
</html>
