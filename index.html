<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBER AI STORE - 多账号商城</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#050816;color:white;overflow-x:hidden;}
a{text-decoration:none;color:inherit;}

/* 背景 */
.bg{position:fixed;width:100%;height:100%;top:0;left:0;
background:radial-gradient(circle at 20% 20%,rgba(0,255,255,0.12),transparent 25%),
radial-gradient(circle at 80% 40%,rgba(140,0,255,0.15),transparent 25%),
radial-gradient(circle at 50% 80%,rgba(0,100,255,0.12),transparent 25%);
z-index:-2;animation:bgmove 12s infinite alternate;}
@keyframes bgmove{0%{transform:scale(1);}100%{transform:scale(1.15);}}

/* 顶部 */
header{position:fixed;top:0;left:0;width:100%;height:70px;display:flex;justify-content:space-between;align-items:center;padding:0 30px;background:rgba(10,10,20,0.7);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.08);z-index:999;}
.logo{font-size:26px;font-weight:bold;background:linear-gradient(90deg,#00e5ff,#8f5cff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
nav a{margin-left:22px;color:#ddd;transition:0.3s;}nav a:hover{color:#00e5ff;}

/* 左侧菜单 */
.sidebar{position:fixed;top:70px;left:0;width:220px;height:100%;background:rgba(15,20,40,0.8);backdrop-filter:blur(10px);padding:25px;border-right:1px solid rgba(255,255,255,0.05);}
.sidebar h3{margin-bottom:20px;color:#00e5ff;}
.sidebar ul{list-style:none;}
.sidebar li{margin-bottom:15px;cursor:pointer;color:#ccc;transition:0.3s;}
.sidebar li:hover{color:#00e5ff;}

/* 用户面板 */
.user-panel{position:fixed;top:90px;right:20px;width:280px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(12px);padding:22px;border-radius:20px;}
.vip{display:inline-block;padding:5px 12px;border-radius:50px;background:#00e5ff22;color:#00e5ff;margin-top:10px;}

/* 主内容 */
.main{margin-left:240px;padding-top:90px;padding-bottom:100px;}

/* Banner */
.hero{position:relative;height:380px;overflow:hidden;border-radius:25px;margin:20px;}
.hero video{width:100%;height:100%;object-fit:cover;filter:brightness(0.4);}
.hero-content{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.hero-content h1{font-size:62px;margin-bottom:15px;}
.hero-content p{color:#ccc;font-size:18px;}

/* 搜索 */
.search-box{padding:20px;}
.search-box input{width:100%;padding:15px;border:none;border-radius:16px;background:rgba(255,255,255,0.06);color:white;outline:none;}

/* 商品 */
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:25px;padding:20px;}
.card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(12px);border-radius:22px;padding:25px;transition:0.3s;position:relative;overflow:hidden;}
.card::before{content:"";position:absolute;width:120px;height:120px;background:rgba(0,229,255,0.12);filter:blur(40px);top:-40px;right:-40px;}
.card:hover{transform:translateY(-6px);box-shadow:0 0 35px rgba(0,229,255,0.15);}
.card img{width:70px;height:70px;object-fit:contain;margin-bottom:15px;}
.card h2{margin-bottom:10px;}
.price{font-size:28px;margin:15px 0;color:#00e5ff;}
.btn{display:inline-block;padding:12px 20px;border-radius:14px;background:linear-gradient(90deg,#00e5ff,#8f5cff);color:white;border:none;cursor:pointer;font-weight:bold;transition:0.3s;}
.btn:hover{transform:scale(1.05);}

/* 商品详情 */
.modal{display:none;position:fixed;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:9999;overflow:auto;}
.modal-content{background:#12192f;max-width:600px;margin:60px auto;padding:30px;border-radius:20px;position:relative;}
.close{position:absolute;right:20px;top:15px;font-size:30px;cursor:pointer;}
.modal img{width:90px;margin-bottom:15px;}
.feature-list{margin-top:20px;}
.feature-list li{margin-bottom:10px;color:#ccc;}

/* 购物车 */
.cart{position:fixed;right:20px;bottom:100px;width:300px;background:#12192f;border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:20px;z-index:999;}
.cart h3{margin-bottom:15px;}
.cart-item{display:flex;justify-content:space-between;margin-bottom:12px;font-size:14px;}

/* 客服 */
.support{position:fixed;right:25px;bottom:25px;padding:15px 24px;border-radius:50px;background:linear-gradient(90deg,#00e5ff,#8f5cff);cursor:pointer;font-weight:bold;}

/* 页脚 */
footer{margin-top:60px;padding:40px 20px;text-align:center;color:#888;border-top:1px solid rgba(255,255,255,0.08);}

/* 响应式 */
@media(max-width:900px){
.sidebar{display:none;}
.main{margin-left:0;}
.user-panel{display:none;}
.hero-content h1{font-size:38px;}
}
</style>
</head>
<body>

<div class="bg"></div>

<header>
<div class="logo">CYBER AI STORE</div>
<nav>
<a href="#">首页</a>
<a href="#">商品</a>
<a href="#">订单</a>
<a href="#">VIP</a>
</nav>
</header>

<div class="sidebar">
<h3>软件分类</h3>
<ul>
<li>Ins成品号</li>
<li>TikTok成品号</li>
<li>Twitter成品号</li>
<li>FB成品号</li>
<li>X(Twitter)成品号</li>
<li>Telegram成品号</li>
</ul>
</div>

<div class="user-panel">
<h2>用户中心</h2>
<p>用户名：DemoUser</p>
<div class="vip">VIP PRO</div>
<p style="margin-top:15px;">余额：¥128.50</p>
<p>积分：2380</p>
</div>

<div class="main">
<div class="hero">
<video autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-programming-on-a-computer-1579/1080p.mp4" type="video/mp4">
</video>
<div class="hero-content">
<h1>海外账号商城</h1>
<p>Ins / TikTok / Twitter / FB / X / Telegram 成品号</p>
</div>
</div>

<div class="search-box">
<input type="text" id="searchInput" placeholder="搜索账号类型">
</div>

<div class="products" id="productList"></div>
</div>

<div class="cart">
<h3>购物车 🛒</h3>
<div id="cartItems"></div>
<hr style="margin:15px 0;opacity:0.2;">
<div id="cartTotal">总价：¥0</div>
</div>

<div class="support" onclick="window.open('https://t.me/ykc666')">联系客服</div>

<footer>
Telegram：@ykc666 | 微信：15629384390<br>
© 2026 CYBER AI STORE
</footer>

<script>
// 商品数据示例
const products=[
{name:"Ins成品号",category:"Ins",price:"价格待填",img:"https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png",desc:"海外Instagram账号成品号",types:["普通账号","高级账号"]},
{name:"TikTok成品号",category:"TikTok",price:"价格待填",img:"https://upload.wikimedia.org/wikipedia/commons/6/6c/TikTok_logo.svg",desc:"海外TikTok账号成品号",types:["普通账号","高级账号"]},
{name:"Twitter成品号",category:"Twitter",price:"价格待填",img:"https://upload.wikimedia.org/wikipedia/commons/6/6b/Twitter_Logo_White_on_Blue.png",desc:"海外Twitter账号成品号",types:["普通账号","高级账号"]},
{name:"FB成品号",category:"Facebook",price:"价格待填",img:"https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg",desc:"海外Facebook账号成品号",types:["普通账号","高级账号"]},
{name:"X(Twitter)成品号",category:"X",price:"价格待填",img:"https://upload.wikimedia.org/wikipedia/commons/7/7b/Twitter_Social_Logo.png",desc:"海外X账号成品号",types:["普通账号","高级账号"]},
{name:"Telegram成品号",category:"Telegram",price:"价格待填",img:"https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg",desc:"海外Telegram账号成品号",types:["普通账号","高级账号"]},
];

// 渲染商品
let cart=[];
function renderProducts(list){
const productList=document.getElementById("productList");
productList.innerHTML="";
list.forEach(p=>{
let typeOptions=p.types.map(t=>`<option>${t}</option>`).join("");
productList.innerHTML+=`
<div class="card fade-in">
<img src="${p.img}">
<h2>${p.name}</h2>
<p>${p.desc}</p>
<select id="typeSelect">${typeOptions}</select>
<div class="price">${p.price}</div>
<button class="btn" onclick='addToCart("${p.name}", "${p.price}", this.previousElementSibling.value)'>加入购物车</button>
</div>`;
});
}
renderProducts(products);

// 搜索功能
document.getElementById("searchInput").addEventListener("input",function(){
const keyword=this.value.toLowerCase();
const filtered=products.filter(p=>p.name.toLowerCase().includes(keyword) || p.category.toLowerCase().includes(keyword));
renderProducts(filtered);
});

// 购物车
function addToCart(name, price, type){
cart.push({name, price, type});
renderCart();
alert(`${name} (${type}) 已加入购物车`);
}
function renderCart(){
const cartItems=document.getElementById("cartItems");
cartItems.innerHTML="";
let total=0;
cart.forEach(item=>{
let num=parseFloat(item.price.replace(/[^\d]/g,''))||0;
total+=num;
cartItems.innerHTML+=`<div class="cart-item"><span>${item.name} (${item.type})</span><span>${item.price}</span></div>`;
});
document.getElementById("cartTotal").innerText="总价：¥"+total;
}
</script>
</body>
</html>
